name: NUFC journalist bot

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub's minimum; often runs slower under load)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # needed to commit state.json back to the repo

concurrency:
  group: nufc-bot
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore X session cookies
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
        run: printf '%s' "$X_COOKIES_JSON" > cookies.json

      - name: Run bot
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_PASSWORD: ${{ secrets.BSKY_PASSWORD }}
          BSKY_ACCOUNTS: ${{ secrets.BSKY_ACCOUNTS }}
          # Per-club secrets (preferred): each holds {"handle":...,"password":...}
          # and overrides the combined BSKY_ACCOUNTS blob. Empty = ignored.
          BSKY_CHELSEA: ${{ secrets.BSKY_CHELSEA }}
          BSKY_MANUTD: ${{ secrets.BSKY_MANUTD }}
          BSKY_MANCITY: ${{ secrets.BSKY_MANCITY }}
          BSKY_LIVERPOOL: ${{ secrets.BSKY_LIVERPOOL }}
          BSKY_ARSENAL: ${{ secrets.BSKY_ARSENAL }}
          BSKY_SPURS: ${{ secrets.BSKY_SPURS }}
        run: python bot.py

      - name: Persist state
        run: |
          git config user.name "nufc-bot"
          git config user.email "nufc-bot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push
